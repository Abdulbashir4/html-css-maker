<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Codgen Page Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind (dev mode ঠিক আছে) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Builder CSS -->
  <link rel="stylesheet" href="builder.css" />
</head>

<body class="h-screen flex flex-col bg-gray-100">

  <!-- ================= HEADER ================= -->
  <header class="h-14 bg-white border-b flex items-center justify-between px-6">
    <div class="font-bold text-lg">Codgen Builder</div>


    <div class="flex gap-2 text-sm">

      <input
      id="pageNameInput"
      type="text"
      placeholder="Page name"
      class="px-2 py-1 border rounded text-sm w-32"
    />

      <button id="btnMobile" class="px-3 py-1 border rounded hover:bg-gray-100">
        📱 Mobile
      </button>
    
      <button id="btnDesktop" class="px-3 py-1 border rounded hover:bg-gray-100">
        💻 Desktop
      </button>
    
      <button id="btnCode" class="px-3 py-1 border rounded hover:bg-gray-100">
        🧾 Preview Code
      </button>

      <button id="btnPublish"
  class="px-3 py-1 border rounded bg-green-600 text-white hover:bg-green-700">
  🚀 Publish
</button>

<button id="btnViewLive"
 class="px-3 py-1 border rounded hover:bg-gray-100">
 🔗 View Page
</button>

<button id="btnLoadPage"
 class="px-3 py-1 border rounded hover:bg-gray-100">
 📥 Load Page
</button>
    </div>
    
  </header>

  <!-- ================= BODY ================= -->
  <div class="flex flex-1 overflow-hidden">

    <!-- ========== SIDEBAR ========== -->
    <aside class="w-64 bg-white border-r flex flex-col">

      <!-- Tabs -->
      <div class="flex border-b">
        <button id="tabBlock"
                class="flex-1 py-2 text-sm font-medium border-b-2 border-blue-600 bg-blue-50">
          Block
        </button>
        <button id="tabStyle"
                class="flex-1 py-2 text-sm text-gray-500">
          Style
        </button>
      </div>

      <!-- Panels -->
      <div class="flex-1 overflow-auto">
        <div id="blockPanel"></div>
        <div id="stylePanel" class="hidden"></div>
      </div>
    </aside>

    <!-- ========== CANVAS ========== -->
    <main class="flex-1 overflow-auto p-8 bg-[#dbeee6]">
      <div
        id="canvas"
        class="w-full min-h-[600px] bg-white border shadow p-4 transition-all"
      ></div>
    </main>
  </div>

  <!-- ================= CODE MODAL ================= -->
  <div
    id="codeModal"
    class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"
  >
    <div class="bg-white w-3/4 h-3/4 p-4 flex flex-col">
      <textarea
        id="codeOutput"
        class="flex-1 w-full border p-2 text-sm font-mono"
      ></textarea>

      <button
        onclick="document.getElementById('codeModal').classList.add('hidden')"
        class="mt-2 bg-blue-600 text-white px-4 py-2 rounded self-end"
      >
        Close
      </button>
    </div>
  </div>

  <!-- ================= ENTRY SCRIPT ================= -->
  <!-- ⚠️ MUST BE type="module" -->
  <script type="module" src="core/init.js"></script>

</body>
</html>
